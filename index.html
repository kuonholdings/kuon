<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>KUON HOLDINGS</title>
<meta name="description" content="KUON HOLDINGS">

<style>

:root{

--bg:#ffffff;
--fg:#111111;

--fg-soft:rgba(0,0,0,.42);
--muted-1:rgba(0,0,0,.74);
--muted-2:rgba(0,0,0,.62);
--muted-3:rgba(0,0,0,.42);

--pad-x:64px;
--pad-y:56px;

--mark:rgba(0,0,0,.18);
--mark-l:22px;
--mark-h:1px;
--mark-gap:18px;

--hero-top:51vh;

--logo-size:56px;
--logo-track:.15em;

--tag-size:14px;
--tag-line:1.85;
--tag-track:.10em;

--meta-size:12px;
--meta-track:.16em;

--contact-gap:36px;

}

*{box-sizing:border-box}

html,body{height:100%}

body{
margin:0;
background:var(--bg);
color:var(--fg);
font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",Helvetica,Arial,sans-serif;
-webkit-font-smoothing:antialiased;
overflow:hidden;
}

.wrap{
height:100%;
width:100%;
padding:var(--pad-y) var(--pad-x);
position:relative;
}

/* crop marks */

.crop{
position:fixed;
width:calc(var(--mark-l)+2px);
height:calc(var(--mark-l)+2px);
pointer-events:none;
}

.crop::before,.crop::after{
content:"";
position:absolute;
background:var(--mark);
}

.crop::before{
width:var(--mark-l);
height:var(--mark-h);
}

.crop::after{
height:var(--mark-l);
width:var(--mark-h);
}

.crop.tl{top:var(--mark-gap);left:var(--mark-gap)}
.crop.tr{top:var(--mark-gap);right:var(--mark-gap);transform:scaleX(-1)}
.crop.bl{bottom:var(--mark-gap);left:var(--mark-gap);transform:scaleY(-1)}
.crop.br{bottom:var(--mark-gap);right:var(--mark-gap);transform:scale(-1)}

/* corners */

.corner{
position:fixed;
font-size:var(--meta-size);
letter-spacing:var(--meta-track);
text-transform:uppercase;
line-height:1.6;
}

.top-left{
top:calc(var(--mark-gap)-2px);
left:calc(var(--mark-gap)+34px);
}

.top-right{
top:calc(var(--mark-gap)-2px);
right:calc(var(--mark-gap)+34px);
color:var(--muted-3);
font-variant-numeric:tabular-nums;
}

.bottom-left{
bottom:calc(var(--mark-gap)-2px);
left:calc(var(--mark-gap)+34px);
color:var(--muted-3);
}

.bottom-right{
bottom:calc(var(--mark-gap)-2px);
right:calc(var(--mark-gap)+34px);
}

/* links */

a{
color:var(--muted-3);
text-decoration:none;
}

a:hover{
color:var(--fg);
}

/* language switch */

.lang-switch{
display:flex;
gap:10px;
align-items:center;
}

.lang-btn{
background:none;
border:0;
cursor:pointer;
font:inherit;
color:var(--muted-3);
}

.lang-btn[aria-current=true]{
color:var(--fg);
}

/* center layout */

.center{
position:absolute;
left:50%;
top:var(--hero-top);
transform:translate(-50%,-50%);
text-align:center;
width:min(900px,calc(100%-40px));
}

/* title */

.logo{
font-size:var(--logo-size);
letter-spacing:var(--logo-track);
margin:0;
font-weight:700;
}

.brand{color:var(--fg)}
.division{color:var(--fg-soft)}

/* tagline */

.tagline{
margin-top:24px;
font-size:var(--tag-size);
line-height:var(--tag-line);
letter-spacing:var(--tag-track);
color:var(--muted-1);
max-width:60ch;
margin-left:auto;
margin-right:auto;
}

/* contact button */

.contact{
margin-top:var(--contact-gap);
background:none;
border:0;
cursor:pointer;
font-size:12px;
letter-spacing:.22em;
text-transform:uppercase;
color:var(--muted-3);
}

.contact:hover{color:var(--fg)}

/* reveal panel */

.panel{
margin-top:22px;
display:grid;
gap:16px;
justify-items:center;
opacity:0;
transform:translateY(6px);
pointer-events:none;
transition:all .25s ease;
}

.panel.open{
opacity:1;
transform:translateY(0);
pointer-events:auto;
}

/* location */

.location{
font-size:12px;
letter-spacing:.16em;
color:var(--muted-3);
}

/* email */

.email{
font-size:13px;
letter-spacing:.12em;
color:var(--muted-2);
}

.email:hover{color:var(--fg)}

</style>
</head>

<body>

<div class="crop tl"></div>
<div class="crop tr"></div>
<div class="crop bl"></div>
<div class="crop br"></div>

<div class="corner top-left">
<a href="https://kuon.studio">STUDIO</a>
</div>

<div class="corner top-right">
<span id="clock">—</span>
</div>

<div class="corner bottom-left">
<span id="kuon">KUON</span>
</div>

<div class="corner bottom-right">
<div class="lang-switch">
<button class="lang-btn" data-lang="en" aria-current="true">EN</button>
<span>/</span>
<button class="lang-btn" data-lang="zh">繁中</button>
</div>
</div>

<div class="wrap">

<div class="center">

<h1 class="logo">
<span class="brand">KUON</span>
<span class="division">HOLDINGS</span>
</h1>

<p class="tagline" id="tagline">
KUON builds across products, distribution, and manufacturing.
</p>

<button class="contact" id="contactBtn">CONTACT</button>

<div class="panel" id="panel">

<div class="location" id="location">
Taipei / London
</div>

<a class="email" href="mailto:info@kuonholdings.com">
info@kuonholdings.com
</a>

</div>

</div>
</div>

<script>

const CONTENT={

en:{
tagline:"KUON builds across products, distribution, and manufacturing.",
location:"Taipei / London",
footer:"KUON",
tz:"Europe/London",
label:"LDN"
},

zh:{
tagline:"久音構建產品、通路與製造能力。",
location:"台北 / 倫敦",
footer:"久音",
tz:"Asia/Taipei",
label:"TPE"
}

}

let lang="en"

const tagline=document.getElementById("tagline")
const location=document.getElementById("location")
const footer=document.getElementById("kuon")
const clock=document.getElementById("clock")

function render(){

const c=CONTENT[lang]

tagline.textContent=c.tagline
location.textContent=c.location
footer.textContent=c.footer

updateClock()

}

function updateClock(){

const c=CONTENT[lang]

const fmt=new Intl.DateTimeFormat("en-GB",{
timeZone:c.tz,
year:"numeric",
month:"2-digit",
day:"2-digit",
hour:"2-digit",
minute:"2-digit",
hour12:false
})

clock.textContent=fmt.format(new Date())+" "+c.label

}

document.querySelectorAll(".lang-btn").forEach(btn=>{
btn.onclick=()=>{
document.querySelectorAll(".lang-btn").forEach(b=>b.removeAttribute("aria-current"))
btn.setAttribute("aria-current","true")
lang=btn.dataset.lang
render()
}
})

const contactBtn=document.getElementById("contactBtn")
const panel=document.getElementById("panel")

contactBtn.onclick=()=>{
panel.classList.toggle("open")
}

render()
setInterval(updateClock,10000)

</script>

</body>
</html>

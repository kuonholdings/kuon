<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>KUON HOLDINGS</title>
<meta name="description" content="KUON HOLDINGS" />
<meta name="theme-color" content="#ffffff" />

<style>
:root{
--bg:#ffffff;
--fg:#111;

--baseline:54vh;
--clock-gap:22px;
--contact-gap:62px;

--panel-gap:16px;
--panel-stack-gap:14px;
--langs-gap:22px;

--muted-1: rgba(0,0,0,0.66);
--muted-2: rgba(0,0,0,0.70);
--muted-3: rgba(0,0,0,0.58);

--pad-x:64px;
--pad-y:56px;

/* crop marks */
--mark: rgba(0,0,0,0.18);
--mark-h:1px;
--mark-l:22px;
--mark-gap:18px;

--logo-size:56px;
--logo-track:0.18em;
--logo-pad:0.18em;

--clock-size:18px;
--clock-tone: rgba(0,0,0,0.14);

/* language cycling */
--cycle-ms:12000ms;
--cycle-line: rgba(0,0,0,0.28);
--cycle-line-h:1px;
--cycle-underline-gap:2px;

/* curtain swap */
--swap-ms:1700ms;
--swap-ease:cubic-bezier(.35,0,.25,1);
--swap-inset-y:6px;
--swap-inset-x:12px;

/* clock fade */
--clockfade-ms:900ms;
--clockfade-ease:cubic-bezier(.35,0,.25,1);

/* fixed line boxes */
--logo-line-h: calc(var(--logo-size) * 1.08);
--contact-font:11px;
--contact-line-h:18px;
}

*{box-sizing:border-box;}
html,body{height:100%;}

body{
margin:0;
background:var(--bg);
color:var(--fg);
overflow:hidden;
font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",Helvetica,Arial,sans-serif;
-webkit-font-smoothing:antialiased;
-moz-osx-font-smoothing:grayscale;
}

.wrap{
height:100%;
width:100%;
padding:var(--pad-y) var(--pad-x);
position:relative;
}

/* crop marks */

.crop{
position:fixed;
width:calc(var(--mark-l) + 2px);
height:calc(var(--mark-l) + 2px);
pointer-events:none;
z-index:5;
opacity:0.78;
transition:opacity 300ms ease;
}

body:hover .crop{opacity:1;}

.crop::before,.crop::after{
content:"";
position:absolute;
background:var(--mark);
}

.crop::before{height:var(--mark-h);width:var(--mark-l);top:0;left:0;}
.crop::after{width:var(--mark-h);height:var(--mark-l);top:0;left:0;}

.crop.tl{top:var(--mark-gap);left:var(--mark-gap);}
.crop.tr{top:var(--mark-gap);right:var(--mark-gap);transform:scaleX(-1);}
.crop.bl{bottom:var(--mark-gap);left:var(--mark-gap);transform:scaleY(-1);}
.crop.br{bottom:var(--mark-gap);right:var(--mark-gap);transform:scale(-1);}

/* layout */

.center{
position:absolute;
left:50%;
top:var(--baseline);
transform:translate(-50%,-50%);
width:min(980px,calc(100% - 40px));
text-align:center;
}

.hero{
display:flex;
flex-direction:column;
align-items:center;
gap:var(--clock-gap);
}

.logoBox{
min-height:var(--logo-line-h);
height:var(--logo-line-h);
}

.logo{
margin:0;
font-weight:700;
letter-spacing:var(--logo-track);
font-size:var(--logo-size);
line-height:1;
padding-left:var(--logo-pad);
white-space:nowrap;
}

/* clock */

.clockX{display:grid;place-items:center;}

.clockX .layer{
grid-area:1/1;
transition:opacity var(--clockfade-ms) var(--clockfade-ease);
}

.clockX .b{opacity:0;}
.clockX.is-b .a{opacity:0;}
.clockX.is-b .b{opacity:1;}

.clock{
font-size:var(--clock-size);
font-weight:500;
letter-spacing:0.14em;
color:var(--clock-tone);
font-variant-numeric:tabular-nums;
white-space:nowrap;
margin:0;
}

/* contact */

.contactRow{margin-top:var(--contact-gap);}

.contact{
display:inline-flex;
align-items:center;
justify-content:center;
border:0;
background:transparent;
padding:6px 10px;
cursor:pointer;
color:rgba(0,0,0,0.62);
font-weight:400;
letter-spacing:0.24em;
font-size:var(--contact-font);
text-transform:uppercase;
}

.contact:hover{color:var(--fg);}

#contactLabel{
display:inline-block;
width:8ch;
text-align:center;
}

/* panel */

.panel{
margin-top:var(--panel-gap);
display:grid;
gap:var(--panel-stack-gap);
justify-items:center;
width:min(560px,100%);
margin-left:auto;
margin-right:auto;
opacity:0;
transform:translateY(6px);
pointer-events:none;
transition:opacity 260ms ease,transform 260ms ease;
}

.panel.is-open{
opacity:1;
transform:translateY(0);
pointer-events:auto;
}

/* descriptor */

.descriptor{
font-size:13px;
letter-spacing:0.12em;
color:var(--muted-1);
max-width:58ch;
line-height:1.8;
text-align:center;
margin:0;
}

.email{
font-size:12px;
letter-spacing:0.14em;
color:var(--muted-2);
text-decoration:none;
padding:4px 10px;
}

.email:hover{color:var(--fg);}

/* languages */

.langs{
margin-top:var(--langs-gap);
display:flex;
align-items:center;
justify-content:center;
gap:18px;
flex-wrap:wrap;
}

.lang{
background:transparent;
border:0;
padding:4px 2px;
cursor:pointer;
color:var(--muted-3);
letter-spacing:0.13em;
font-size:11px;
text-transform:uppercase;
}

.lang:hover{color:var(--fg);}

.lang[aria-current="true"]{
color:rgba(0,0,0,0.78);
}

/* footer */

.bottom{
position:fixed;
left:0;
right:0;
bottom:var(--mark-gap);
padding:0 var(--pad-x);
display:flex;
justify-content:space-between;
align-items:flex-end;
pointer-events:none;
}

.bottom .left,
.bottom .right{
font-size:11px;
letter-spacing:0.14em;
color:rgba(0,0,0,0.34);
line-height:1.6;
text-transform:uppercase;
}

.bottom .right{text-align:right;}

@media(max-width:720px){

:root{
--pad-x:22px;
--pad-y:40px;
--logo-size:42px;
--logo-track:0.14em;
--logo-pad:0.14em;
}

.bottom .left,
.bottom .right{
white-space:normal;
}

}
</style>
</head>

<body>

<div class="crop tl"></div>
<div class="crop tr"></div>
<div class="crop bl"></div>
<div class="crop br"></div>

<div class="wrap">

<main class="center">

<div class="hero">

<div class="logoBox">
<h1 class="logo">KUON HOLDINGS</h1>
</div>

<div class="clockX" id="clockX">
<div class="layer a"><div class="clock" id="clockA"></div></div>
<div class="layer b"><div class="clock" id="clockB"></div></div>
</div>

</div>

<div class="contactRow">

<button class="contact" id="contactBtn">
<span id="contactLabel">contact</span>
</button>

<div class="panel" id="panel">

<p class="descriptor">
KUON holds work intended to last — across design, sound, and structure.
</p>

<a class="email" href="mailto:info@kuonholdings.com">
info@kuonholdings.com
</a>

<div class="langs">
<button class="lang" data-lang="en" aria-current="true">ENGLISH</button>
<button class="lang" data-lang="ja">JAPANESE</button>
<button class="lang" data-lang="zh">CHINESE</button>
</div>

</div>

</div>

</main>

</div>

<footer class="bottom">
<div class="left">KUON</div>
<div class="right">TAIPEI | LONDON</div>
</footer>

<script>

const CONTENT={
en:{
tz:"UTC",
tzLabel:"UTC",
contact:"contact",
back:"back"
},
ja:{
tz:"Asia/Taipei",
tzLabel:"TPE",
contact:"連絡",
back:"戻る"
},
zh:{
tz:"Asia/Taipei",
tzLabel:"TPE",
contact:"联系",
back:"返回"
}
};

let currentLang="en";
let open=false;

const contactBtn=document.getElementById("contactBtn");
const panel=document.getElementById("panel");
const contactLabel=document.getElementById("contactLabel");

contactBtn.onclick=()=>{
open=!open;
panel.classList.toggle("is-open",open);
contactLabel.textContent=open?CONTENT[currentLang].back:CONTENT[currentLang].contact;
};

function partsForTZ(date,timeZone){
const fmt=new Intl.DateTimeFormat("en-GB",{
timeZone,
year:"numeric",
month:"2-digit",
day:"2-digit",
hour:"2-digit",
minute:"2-digit",
hour12:false
});
const parts=fmt.formatToParts(date);
const get=t=>parts.find(p=>p.type===t)?.value||"";
return{
Y:get("year"),
M:get("month"),
D:get("day"),
h:get("hour"),
m:get("minute")
};
}

function formatInTZ(date,lang){
const{tz,tzLabel}=CONTENT[lang];
const p=partsForTZ(date,tz);
return`${p.Y}.${p.M}.${p.D} ${p.h}:${p.m} ${tzLabel}`;
}

const clockA=document.getElementById("clockA");
const clockB=document.getElementById("clockB");
const clockX=document.getElementById("clockX");

function setClockText(text){
clockA.textContent=text;
clockB.textContent=text;
}

setClockText(formatInTZ(new Date(),"en"));

setInterval(()=>{
setClockText(formatInTZ(new Date(),currentLang));
},10000);

</script>

</body>
</html>

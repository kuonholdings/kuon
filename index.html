<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>KUON HOLDINGS</title>
  <meta name="description" content="KUON HOLDINGS" />
  <meta name="theme-color" content="#ffffff" />

  <style>
    :root{
      --bg:#ffffff;
      --fg:#111111;
      --fg-soft:rgba(70,78,92,0.68); /* slightly cooler for HOLDINGS */
      --muted-1:rgba(0,0,0,0.74);
      --muted-2:rgba(0,0,0,0.62);
      --muted-3:rgba(0,0,0,0.42);
      --muted-4:rgba(0,0,0,0.24);

      --pad-x:64px;
      --pad-y:56px;

      --mark:rgba(0,0,0,0.18);
      --mark-h:1px;
      --mark-l:22px;
      --mark-gap:18px;

      --hero-top:51vh;

      --logo-size:56px;
      --logo-track:0.15em;
      --logo-pad:0.15em;
      --logo-line-h:calc(var(--logo-size) * 1.12);

      --meta-size:12px;
      --meta-track:0.15em;

      --tag-size:14px;
      --tag-line:1.85;
      --tag-track:0.10em;
      --tag-gap:24px;

      --contact-size:12px;
      --contact-track:0.22em;
      --contact-gap:36px;
      --contact-line-h:20px;

      --loc-size:12px;
      --loc-track:0.16em;

      --email-size:13px;
      --email-track:0.12em;

      --panel-gap:14px;
      --panel-width:640px;
      --panel-min-h:80px;

      --swap-ms:900ms;
      --swap-ease:cubic-bezier(.35,0,.25,1);
      --swap-inset-y:6px;
      --swap-inset-x:12px;

      --intro-brand-ms:700ms;
      --intro-division-ms:700ms;
      --intro-rest-ms:700ms;
      --intro-delay-1:180ms;
      --intro-delay-2:520ms;
      --intro-delay-3:860ms;
    }

    *{ box-sizing:border-box; }
    html, body{ height:100%; }

    body{
      margin:0;
      background:var(--bg);
      color:var(--fg);
      overflow:hidden;
      font-family:-apple-system, BlinkMacSystemFont, "Helvetica Neue", Helvetica, Arial, sans-serif;
      -webkit-font-smoothing:antialiased;
      -moz-osx-font-smoothing:grayscale;
    }

    a, button{
      -webkit-tap-highlight-color: transparent;
    }

    .wrap{
      position:relative;
      width:100%;
      height:100%;
      padding:var(--pad-y) var(--pad-x);
    }

    .crop{
      position:fixed;
      width:calc(var(--mark-l) + 2px);
      height:calc(var(--mark-l) + 2px);
      pointer-events:none;
      z-index:1;
      opacity:0.78;
      transition:opacity 300ms ease;
    }

    body:hover .crop{ opacity:1; }

    .crop::before,
    .crop::after{
      content:"";
      position:absolute;
      background:var(--mark);
    }

    .crop::before{
      width:var(--mark-l);
      height:var(--mark-h);
      top:0;
      left:0;
    }

    .crop::after{
      width:var(--mark-h);
      height:var(--mark-l);
      top:0;
      left:0;
    }

    .crop.tl{ top:var(--mark-gap); left:var(--mark-gap); }
    .crop.tr{ top:var(--mark-gap); right:var(--mark-gap); transform:scaleX(-1); }
    .crop.bl{ bottom:var(--mark-gap); left:var(--mark-gap); transform:scaleY(-1); }
    .crop.br{ bottom:var(--mark-gap); right:var(--mark-gap); transform:scale(-1); }

    .corner{
      position:fixed;
      z-index:2;
      font-size:var(--meta-size);
      letter-spacing:var(--meta-track);
      text-transform:uppercase;
      line-height:1.6;
      white-space:nowrap;
    }

    .corner a,
    .corner button,
    .corner span{
      font:inherit;
      letter-spacing:inherit;
      text-transform:inherit;
    }

    .top-left{
      top:calc(var(--mark-gap) - 2px);
      left:calc(var(--mark-gap) + 34px);
    }

    .top-right{
      top:calc(var(--mark-gap) - 2px);
      right:calc(var(--mark-gap) + 34px);
      text-align:right;
      color:var(--muted-3);
      font-variant-numeric:tabular-nums;
      user-select:none;
    }

    .bottom-left{
      left:calc(var(--mark-gap) + 34px);
      bottom:calc(var(--mark-gap) - 2px);
      color:var(--muted-3);
      pointer-events:none;
    }

    .bottom-right{
      right:calc(var(--mark-gap) + 34px);
      bottom:calc(var(--mark-gap) - 2px);
      text-align:right;
    }

    .sister-link{
      color:var(--muted-3);
      text-decoration:none;
      transition:color 180ms ease;
    }

    .sister-link:hover{ color:var(--fg); }

    .lang-switch{
      display:flex;
      align-items:center;
      gap:10px;
    }

    .lang-btn{
      background:transparent;
      border:0;
      padding:0;
      cursor:pointer;
      color:var(--muted-3);
      transition:color 180ms ease;
    }

    .lang-btn:hover{ color:var(--fg); }

    .lang-btn[aria-current="true"]{
      color:rgba(0,0,0,0.82);
    }

    .lang-sep{
      color:var(--muted-4);
      pointer-events:none;
    }

    .center{
      position:absolute;
      left:50%;
      top:var(--hero-top);
      transform:translate(-50%, -50%);
      width:min(980px, calc(100% - 40px));
      text-align:center;
    }

    .hero{
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:flex-start;
      min-height:355px;
    }

    .logoBox{
      height:var(--logo-line-h);
      min-height:var(--logo-line-h);
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .logo{
      margin:0;
      font-size:var(--logo-size);
      line-height:1;
      letter-spacing:var(--logo-track);
      padding-left:var(--logo-pad);
      white-space:nowrap;
      font-weight:700;
    }

    .logo .brand{ color:var(--fg); }
    .logo .division{ color:var(--fg-soft); }

    .tagline{
      margin:var(--tag-gap) 0 0;
      max-width:60ch;
      min-height:56px;
      font-size:var(--tag-size);
      line-height:var(--tag-line);
      letter-spacing:var(--tag-track);
      color:var(--muted-1);
      text-align:center;
    }

    .contact{
      margin-top:var(--contact-gap);
      background:transparent;
      border:0;
      padding:0;
      cursor:pointer;
      font-size:var(--contact-size);
      line-height:1.6;
      letter-spacing:var(--contact-track);
      text-transform:uppercase;
      color:var(--muted-3);
      transition:color 180ms ease;
    }

    .contact:hover{ color:var(--fg); }

    .contact:focus{ outline:none; }
    .contact:focus-visible{
      outline:1px solid rgba(0,0,0,0.18);
      outline-offset:6px;
      border-radius:8px;
    }

    .panel{
      width:min(var(--panel-width), 100%);
      min-height:var(--panel-min-h);
      margin:20px auto 0;
      display:grid;
      gap:var(--panel-gap);
      justify-items:center;
      opacity:0;
      visibility:hidden;
      transform:translateY(6px);
      pointer-events:none;
      transition:
        opacity 220ms ease,
        transform 220ms ease,
        visibility 0s linear 220ms;
    }

    .panel.is-open{
      opacity:1;
      visibility:visible;
      transform:translateY(0);
      pointer-events:auto;
      transition:
        opacity 220ms ease,
        transform 220ms ease,
        visibility 0s linear 0s;
    }

    .location{
      margin:0;
      font-size:var(--loc-size);
      line-height:1.7;
      letter-spacing:var(--loc-track);
      text-transform:uppercase;
      color:var(--muted-3);
      text-align:center;
    }

    .email{
      font-size:var(--email-size);
      line-height:1.7;
      letter-spacing:var(--email-track);
      color:var(--muted-2);
      text-decoration:none;
      transition:color 160ms ease;
    }

    .email:hover{ color:var(--fg); }

    /* intro */
    .intro-brand,
    .intro-division,
    .intro-rest{
      opacity:0;
      transform:translateY(8px);
    }

    .is-ready .intro-brand{
      animation:introRise var(--intro-brand-ms) cubic-bezier(.22,.61,.36,1) var(--intro-delay-1) forwards;
    }

    .is-ready .intro-division{
      animation:introRise var(--intro-division-ms) cubic-bezier(.22,.61,.36,1) var(--intro-delay-2) forwards;
    }

    .is-ready .intro-rest{
      animation:introRise var(--intro-rest-ms) cubic-bezier(.22,.61,.36,1) var(--intro-delay-3) forwards;
    }

    @keyframes introRise{
      from{
        opacity:0;
        transform:translateY(8px);
      }
      to{
        opacity:1;
        transform:translateY(0);
      }
    }

    @media (prefers-reduced-motion: reduce){
      .intro-brand,
      .intro-division,
      .intro-rest{
        opacity:1;
        transform:none;
        animation:none !important;
      }
    }

    @media (max-width: 720px){
      :root{
        --pad-x:22px;
        --pad-y:40px;
        --mark-l:18px;
        --mark-gap:14px;
        --hero-top:50vh;
        --logo-size:42px;
        --logo-track:0.12em;
        --logo-pad:0.12em;
        --tag-size:13px;
        --meta-size:11px;
        --contact-size:11px;
      }

      .top-left{ left:calc(var(--mark-gap) + 28px); }
      .top-right{ right:calc(var(--mark-gap) + 28px); }
      .bottom-left{ left:calc(var(--mark-gap) + 28px); }
      .bottom-right{ right:calc(var(--mark-gap) + 28px); }
    }
  </style>
</head>

<body>
  <div class="crop tl" aria-hidden="true"></div>
  <div class="crop tr" aria-hidden="true"></div>
  <div class="crop bl" aria-hidden="true"></div>
  <div class="crop br" aria-hidden="true"></div>

  <div class="corner top-left intro-rest">
    <a class="sister-link" href="https://kuon.studio">STUDIO</a>
  </div>

  <div class="corner top-right intro-rest">
    <span id="clockText">—</span>
  </div>

  <div class="corner bottom-left intro-rest">
    <span id="footerBrand">KUON</span>
  </div>

  <div class="corner bottom-right intro-rest">
    <div class="lang-switch" aria-label="Language selector">
      <button class="lang-btn" type="button" data-lang="en" aria-current="true">EN</button>
      <span class="lang-sep">/</span>
      <button class="lang-btn" type="button" data-lang="zh-Hant">繁中</button>
    </div>
  </div>

  <div class="wrap">
    <main class="center" aria-label="KUON HOLDINGS">
      <div class="hero">
        <div class="logoBox">
          <h1 class="logo">
            <span class="brand intro-brand">KUON</span>
            <span class="division intro-division">HOLDINGS</span>
          </h1>
        </div>

        <p class="tagline intro-rest" id="taglineText">
          KUON builds across products, distribution, and manufacturing.
        </p>

        <button class="contact intro-rest" id="contactBtn" type="button" aria-expanded="false" aria-controls="contactPanel">
          <span id="contactLabel">CONTACT</span>
        </button>

        <div class="panel intro-rest" id="contactPanel" aria-live="polite">
          <p class="location" id="locationText">Taipei / London</p>
          <a class="email" href="mailto:info@kuonholdings.com">info@kuonholdings.com</a>
        </div>
      </div>
    </main>
  </div>

  <script>
    const prefersReducedMotion =
      window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;

    const CONTENT = {
      "en": {
        htmlLang: "en",
        tagline: "KUON builds across products, distribution, and manufacturing.",
        location: "Taipei / London",
        footerBrand: "KUON",
        contact: "CONTACT",
        back: "BACK",
        tz: "Europe/London",
        label: "LDN"
      },
      "zh-Hant": {
        htmlLang: "zh-Hant",
        tagline: "久音構建產品、通路與製造能力。",
        location: "台北 / 倫敦",
        footerBrand: "久音",
        contact: "聯絡",
        back: "返回",
        tz: "Asia/Taipei",
        label: "TPE"
      }
    };

    let currentLang = "en";
    let panelOpen = false;

    const taglineText = document.getElementById("taglineText");
    const locationText = document.getElementById("locationText");
    const footerBrand = document.getElementById("footerBrand");
    const contactBtn = document.getElementById("contactBtn");
    const contactLabel = document.getElementById("contactLabel");
    const contactPanel = document.getElementById("contactPanel");
    const clockText = document.getElementById("clockText");
    const langButtons = Array.from(document.querySelectorAll(".lang-btn"));

    function partsForTZ(date, timeZone){
      const fmt = new Intl.DateTimeFormat("en-GB", {
        timeZone,
        year: "numeric",
        month: "2-digit",
        day: "2-digit",
        hour: "2-digit",
        minute: "2-digit",
        hour12: false
      });

      const parts = fmt.formatToParts(date);
      const get = (type) => parts.find(p => p.type === type)?.value || "";

      return {
        Y: get("year"),
        M: get("month"),
        D: get("day"),
        h: get("hour"),
        m: get("minute")
      };
    }

    function updateClock(){
      const c = CONTENT[currentLang];
      const p = partsForTZ(new Date(), c.tz);
      clockText.textContent = `${p.Y}.${p.M}.${p.D} ${p.h}:${p.m} ${c.label}`;
    }

    function setActiveLang(langKey){
      langButtons.forEach(btn => {
        if (btn.dataset.lang === langKey) {
          btn.setAttribute("aria-current", "true");
        } else {
          btn.removeAttribute("aria-current");
        }
      });
    }

    function applyLanguage(langKey){
      const c = CONTENT[langKey];
      document.documentElement.lang = c.htmlLang;
      taglineText.textContent = c.tagline;
      locationText.textContent = c.location;
      footerBrand.textContent = c.footerBrand;
      contactLabel.textContent = panelOpen ? c.back : c.contact;
      setActiveLang(langKey);
      updateClock();
    }

    function setLanguage(langKey){
      if (!CONTENT[langKey] || langKey === currentLang) return;
      currentLang = langKey;
      applyLanguage(langKey);
    }

    function setPanelOpen(open){
      panelOpen = open;
      contactPanel.classList.toggle("is-open", open);
      contactBtn.setAttribute("aria-expanded", String(open));
      contactLabel.textContent = open ? CONTENT[currentLang].back : CONTENT[currentLang].contact;
    }

    contactBtn.addEventListener("click", () => {
      setPanelOpen(!panelOpen);
    });

    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape" && panelOpen) {
        setPanelOpen(false);
        contactBtn.focus();
      }
    });

    langButtons.forEach(btn => {
      btn.addEventListener("click", () => {
        setLanguage(btn.dataset.lang);
      });
    });

    applyLanguage("en");
    updateClock();
    setInterval(updateClock, 10000);

    if (!prefersReducedMotion) {
      requestAnimationFrame(() => {
        document.body.classList.add("is-ready");
      });
    } else {
      document.body.classList.add("is-ready");
    }
  </script>
</body>
</html>

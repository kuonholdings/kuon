<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>KUON HOLDINGS</title>

<link href="https://fonts.googleapis.com/css2?family=Zhi+Mang+Xing&display=swap" rel="stylesheet">

<style>
html, body {
  height: 100%;
  margin: 0;
}

body {
  background: #ffffff;
  color: #000000;
  font-family: Arial, Helvetica, sans-serif;
  overflow: hidden;
}

/* Top-right navigation */

.nav-link {
  position: absolute;
  top: 28px;
  right: 40px;
  font-size: 0.8rem;
  color: #000000;
  opacity: 0.6;
}

.nav-link a {
  text-decoration: none;
  color: inherit;
  display: inline-flex;
  align-items: center;
  gap: 4px;
  transition: all 0.2s ease;
}

.arrow {
  transition: transform 0.2s ease;
}

.nav-link a:hover {
  opacity: 1;
}

.nav-link a:hover .arrow {
  transform: translateX(4px);
}

/* Main block */

.wrap {
  position: absolute;
  top: 50%;
  right: 10vw;
  transform: translateY(-55%);
  display: flex;
  flex-direction: column;
  align-items: flex-end;
}

/* BVI label */

.label {
  margin-bottom: 6px;
  font-size: 0.7rem;
  color: #000000;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  opacity: 0.7;
}

/* Datum line */

.line {
  height: 1px;
  width: 60vw;
  background: #000000;
  margin-bottom: 14px;
}

/* Title */

.center {
  font-size: 2rem;
  font-weight: 700;
  letter-spacing: -0.04em;
  text-transform: uppercase;
  text-align: right;
  white-space: nowrap;
}

.jp {
  margin-left: 6px;
  font-family: 'Zhi Mang Xing', cursive;
  font-size: 1.85rem;
  position: relative;
  top: 1px;
  text-transform: none;
}

/* Info */

.email {
  margin-top: 20px;
  font-size: 0.9rem;
  color: #000000;
}

.email a {
  color: inherit;
  text-decoration: none;
  border-bottom: 1px solid transparent;
  transition: border-color 0.2s ease;
}

.email a:hover {
  border-bottom: 1px solid #000000;
}

.location {
  margin-top: 4px;
  font-size: 0.9rem;
  color: #000000;
  letter-spacing: 0.01em;
}

/* Year */

.year {
  position: absolute;
  bottom: 40px;
  right: 40px;
  font-size: 0.75rem;
  color: #000000;
  letter-spacing: 0.05em;
  transform: rotate(90deg);
  transform-origin: right bottom;
  opacity: 0.7;
}

/* Responsive */

@media (max-width: 640px) {
  .wrap {
    right: 8vw;
  }

  .center {
    font-size: 1.5rem;
  }

  .jp {
    font-size: 1.45rem;
  }

  .email,
  .location {
    font-size: 0.82rem;
  }

  .line {
    width: 70vw;
  }

  .year {
    bottom: 28px;
    right: 28px;
  }
}
</style>
</head>

<body>

<!-- Top-right link -->
<div class="nav-link">
  <a href="https://kuon.studio">
    Studio <span class="arrow">→</span>
  </a>
</div>

<!-- Main content -->
<div class="wrap">

  <div class="label">bvi</div>

  <div class="line"></div>

  <div class="center">
    KUON HOLDINGS <span class="jp">久音</span>
  </div>

  <div class="email">
    <a href="mailto:hello@kuonholdings.com">hello@kuonholdings.com</a>
  </div>

  <div class="location">
    London | Taiwan
  </div>

</div>

<!-- Year -->
<div class="year">2027</div>

</body>
</html>

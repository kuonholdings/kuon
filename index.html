<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>KUON HOLDINGS</title>
  <meta name="description" content="KUON HOLDINGS" />
  <meta name="theme-color" content="#ffffff" />

  <style>
    :root{
      --bg:#ffffff;
      --fg:#111111;
      --fg-soft:rgba(0,0,0,0.44);
      --muted-1:rgba(0,0,0,0.68);
      --muted-2:rgba(0,0,0,0.58);
      --muted-3:rgba(0,0,0,0.36);
      --line:rgba(0,0,0,0.18);

      --pad-x:64px;
      --pad-y:56px;

      --mark:rgba(0,0,0,0.18);
      --mark-h:1px;
      --mark-l:22px;
      --mark-gap:18px;

      --hero-top:52vh;

      --logo-size:56px;
      --logo-track:0.15em;
      --logo-pad:0.15em;
      --logo-line-h:calc(var(--logo-size) * 1.12);

      --meta-size:11px;
      --meta-track:0.16em;

      --contact-size:11px;
      --contact-track:0.24em;
      --contact-gap:56px;
      --contact-line-h:18px;

      --desc-size:13px;
      --desc-track:0.12em;
      --desc-line:1.8;

      --panel-gap:18px;
      --panel-width:560px;

      --swap-ms:1200ms;
      --swap-ease:cubic-bezier(.35,0,.25,1);
      --swap-inset-y:6px;
      --swap-inset-x:12px;
    }

    *{ box-sizing:border-box; }
    html, body{ height:100%; }

    body{
      margin:0;
      background:var(--bg);
      color:var(--fg);
      overflow:hidden;
      font-family:-apple-system, BlinkMacSystemFont, "Helvetica Neue", Helvetica, Arial, sans-serif;
      -webkit-font-smoothing:antialiased;
      -moz-osx-font-smoothing:grayscale;
    }

    a, button{
      -webkit-tap-highlight-color: transparent;
    }

    .wrap{
      position:relative;
      width:100%;
      height:100%;
      padding:var(--pad-y) var(--pad-x);
    }

    /* crop marks */

    .crop{
      position:fixed;
      width:calc(var(--mark-l) + 2px);
      height:calc(var(--mark-l) + 2px);
      pointer-events:none;
      z-index:1;
      opacity:0.78;
      transition:opacity 300ms ease;
    }

    body:hover .crop{ opacity:1; }

    .crop::before,
    .crop::after{
      content:"";
      position:absolute;
      background:var(--mark);
    }

    .crop::before{
      width:var(--mark-l);
      height:var(--mark-h);
      top:0;
      left:0;
    }

    .crop::after{
      width:var(--mark-h);
      height:var(--mark-l);
      top:0;
      left:0;
    }

    .crop.tl{ top:var(--mark-gap); left:var(--mark-gap); }
    .crop.tr{ top:var(--mark-gap); right:var(--mark-gap); transform:scaleX(-1); }
    .crop.bl{ bottom:var(--mark-gap); left:var(--mark-gap); transform:scaleY(-1); }
    .crop.br{ bottom:var(--mark-gap); right:var(--mark-gap); transform:scale(-1); }

    /* corner elements */

    .corner{
      position:fixed;
      z-index:2;
      font-size:var(--meta-size);
      letter-spacing:var(--meta-track);
      text-transform:uppercase;
      line-height:1.6;
    }

    .corner a,
    .corner button,
    .corner span{
      font:inherit;
      letter-spacing:inherit;
      text-transform:inherit;
    }

    .top-left{
      top:calc(var(--mark-gap) - 2px);
      left:calc(var(--mark-gap) + 34px);
    }

    .top-right{
      top:calc(var(--mark-gap) - 2px);
      right:calc(var(--mark-gap) + 34px);
      text-align:right;
      color:var(--muted-3);
      font-variant-numeric:tabular-nums;
      white-space:nowrap;
      user-select:none;
    }

    .bottom-left{
      left:calc(var(--mark-gap) + 34px);
      bottom:calc(var(--mark-gap) - 2px);
      color:var(--muted-3);
      pointer-events:none;
    }

    .bottom-right{
      right:calc(var(--mark-gap) + 34px);
      bottom:calc(var(--mark-gap) - 2px);
      text-align:right;
    }

    .sister-link{
      color:var(--muted-3);
      text-decoration:none;
      transition:color 180ms ease;
    }

    .sister-link:hover{ color:var(--fg); }

    .lang-switch{
      display:flex;
      align-items:center;
      gap:10px;
    }

    .lang-btn{
      background:transparent;
      border:0;
      padding:0;
      cursor:pointer;
      color:var(--muted-3);
      transition:color 180ms ease;
    }

    .lang-btn:hover{ color:var(--fg); }

    .lang-btn[aria-current="true"]{
      color:rgba(0,0,0,0.80);
    }

    .lang-sep{
      color:rgba(0,0,0,0.24);
      pointer-events:none;
    }

    /* center */

    .center{
      position:absolute;
      left:50%;
      top:var(--hero-top);
      transform:translate(-50%, -50%);
      width:min(980px, calc(100% - 40px));
      text-align:center;
    }

    .hero{
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:flex-start;
      min-height:190px;
    }

    .logoBox{
      height:var(--logo-line-h);
      min-height:var(--logo-line-h);
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .logo{
      margin:0;
      font-size:var(--logo-size);
      line-height:1;
      letter-spacing:var(--logo-track);
      padding-left:var(--logo-pad);
      white-space:nowrap;
      font-weight:700;
    }

    .logo .brand{
      color:var(--fg);
    }

    .logo .division{
      color:var(--fg-soft);
    }

    .contactRow{
      margin-top:var(--contact-gap);
      min-height:140px;
    }

    .contact{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      border:0;
      background:transparent;
      padding:6px 10px;
      cursor:pointer;
      color:rgba(0,0,0,0.62);
      font-weight:400;
      letter-spacing:var(--contact-track);
      font-size:var(--contact-size);
      text-transform:uppercase;
      transition:color 180ms ease;
    }

    .contact:hover{ color:var(--fg); }

    .contact:focus{ outline:none; }
    .contact:focus-visible{
      outline:1px solid rgba(0,0,0,0.18);
      outline-offset:6px;
      border-radius:10px;
    }

    .contactLabelBox{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:var(--contact-line-h);
      height:var(--contact-line-h);
      min-width:8ch;
    }

    .panel{
      width:min(var(--panel-width), 100%);
      margin:18px auto 0;
      display:grid;
      gap:var(--panel-gap);
      justify-items:center;
      opacity:0;
      transform:translateY(6px);
      pointer-events:none;
      transition:opacity 240ms ease, transform 240ms ease;
    }

    .panel.is-open{
      opacity:1;
      transform:translateY(0);
      pointer-events:auto;
    }

    .descriptor{
      margin:0;
      max-width:58ch;
      font-size:var(--desc-size);
      line-height:var(--desc-line);
      letter-spacing:var(--desc-track);
      color:var(--muted-1);
      text-align:center;
    }

    .locationLine{
      margin:0;
      font-size:11px;
      line-height:1.6;
      letter-spacing:0.18em;
      text-transform:uppercase;
      color:var(--muted-3);
      text-align:center;
    }

    .email{
      font-size:12px;
      line-height:1.6;
      letter-spacing:0.14em;
      color:var(--muted-2);
      text-decoration:none;
      padding:4px 10px;
      transition:color 160ms ease;
    }

    .email:hover{ color:var(--fg); }

    /* subtle curtain */

    .swapBox{
      position:relative;
      display:inline-flex;
      align-items:center;
      justify-content:center;
    }

    .swapBox::before{
      content:"";
      position:absolute;
      inset:calc(-1 * var(--swap-inset-y)) calc(-1 * var(--swap-inset-x));
      background:var(--bg);
      opacity:0;
      pointer-events:none;
    }

    @keyframes curtain{
      0%   { opacity:0; }
      45%  { opacity:1; }
      55%  { opacity:1; }
      100% { opacity:0; }
    }

    .swapBox.is-swapping::before{
      animation:curtain var(--swap-ms) var(--swap-ease) both;
    }

    @media (prefers-reduced-motion: reduce){
      .swapBox.is-swapping::before{ animation:none; opacity:0; }
      .panel{ transition:none; }
    }

    @media (max-width: 720px){
      :root{
        --pad-x:22px;
        --pad-y:40px;
        --mark-l:18px;
        --mark-gap:14px;
        --hero-top:50vh;
        --logo-size:42px;
        --logo-track:0.12em;
        --logo-pad:0.12em;
        --contact-gap:48px;
        --desc-size:12px;
      }

      .top-left{ left:calc(var(--mark-gap) + 28px); }
      .top-right{ right:calc(var(--mark-gap) + 28px); }
      .bottom-left{ left:calc(var(--mark-gap) + 28px); }
      .bottom-right{ right:calc(var(--mark-gap) + 28px); }

      .top-right{
        max-width:42vw;
        white-space:normal;
      }
    }
  </style>
</head>

<body>
  <div class="crop tl" aria-hidden="true"></div>
  <div class="crop tr" aria-hidden="true"></div>
  <div class="crop bl" aria-hidden="true"></div>
  <div class="crop br" aria-hidden="true"></div>

  <div class="corner top-left">
    <a class="sister-link" href="https://kuon.studio">Studio</a>
  </div>

  <div class="corner top-right">
    <span id="clockText">—</span>
  </div>

  <div class="corner bottom-left">
    <span id="footerBrand">KUON</span>
  </div>

  <div class="corner bottom-right">
    <div class="lang-switch" aria-label="Language selector">
      <button class="lang-btn" type="button" data-lang="en" aria-current="true">EN</button>
      <span class="lang-sep">/</span>
      <button class="lang-btn" type="button" data-lang="zh-Hant">繁中</button>
    </div>
  </div>

  <div class="wrap">
    <main class="center" aria-label="KUON HOLDINGS">
      <div class="hero">
        <div class="logoBox">
          <h1 class="logo">
            <span class="brand">KUON</span>
            <span class="division" id="divisionText">HOLDINGS</span>
          </h1>
        </div>
      </div>

      <div class="contactRow">
        <button class="contact" id="contactBtn" type="button" aria-expanded="false" aria-controls="panel">
          <span class="swapBox contactLabelBox" id="contactSwap">
            <span id="contactLabel">contact</span>
          </span>
        </button>

        <div class="panel" id="panel" aria-live="polite">
          <div class="swapBox" id="descSwap">
            <p class="descriptor" id="descText">
              KUON holds work intended to last — across design, sound, and structure.
            </p>
          </div>

          <p class="locationLine" id="locationText">Taipei / London</p>

          <a class="email" id="emailText" href="mailto:info@kuonholdings.com">info@kuonholdings.com</a>
        </div>
      </div>
    </main>
  </div>

  <script>
    const prefersReducedMotion =
      window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;

    const SWAP_TOTAL_MS = 1200;
    const SWAP_AT_MS = Math.round(SWAP_TOTAL_MS * 0.50);

    const CONTENT = {
      "en": {
        htmlLang: "en",
        contact: "contact",
        back: "back",
        desc: "KUON holds work intended to last — across design, sound, and structure.",
        location: "Taipei / London",
        footerBrand: "KUON",
        clockZone: "Asia/Taipei",
        clockLabel: "TPE"
      },
      "zh-Hant": {
        htmlLang: "zh-Hant",
        contact: "聯絡",
        back: "返回",
        desc: "KUON 持有旨在長久延續的工作——涵蓋設計、聲音與結構。",
        location: "台北 / 倫敦",
        footerBrand: "久音",
        clockZone: "Asia/Taipei",
        clockLabel: "TPE"
      }
    };

    let currentLang = "en";
    let open = false;

    const clockText = document.getElementById("clockText");
    const contactBtn = document.getElementById("contactBtn");
    const contactLabel = document.getElementById("contactLabel");
    const panel = document.getElementById("panel");
    const descText = document.getElementById("descText");
    const locationText = document.getElementById("locationText");
    const footerBrand = document.getElementById("footerBrand");
    const contactSwap = document.getElementById("contactSwap");
    const descSwap = document.getElementById("descSwap");
    const langButtons = Array.from(document.querySelectorAll(".lang-btn"));

    function partsForTZ(date, timeZone){
      const fmt = new Intl.DateTimeFormat("en-GB", {
        timeZone,
        year: "numeric",
        month: "2-digit",
        day: "2-digit",
        hour: "2-digit",
        minute: "2-digit",
        hour12: false
      });
      const parts = fmt.formatToParts(date);
      const get = (type) => parts.find(p => p.type === type)?.value || "";
      return {
        Y: get("year"),
        M: get("month"),
        D: get("day"),
        h: get("hour"),
        m: get("minute")
      };
    }

    function formatClock(date, langKey){
      const { clockZone, clockLabel } = CONTENT[langKey];
      const p = partsForTZ(date, clockZone);
      return `${p.Y}.${p.M}.${p.D} ${p.h}:${p.m} ${clockLabel}`;
    }

    function updateClock(){
      clockText.textContent = formatClock(new Date(), currentLang);
    }

    function startCurtain(box){
      box.classList.remove("is-swapping");
      void box.offsetWidth;
      box.classList.add("is-swapping");
    }

    function stopCurtain(box){
      box.classList.remove("is-swapping");
    }

    function curtainSwap(boxes, applyNewContent){
      if (prefersReducedMotion){
        applyNewContent();
        return;
      }
      boxes.forEach(startCurtain);
      setTimeout(applyNewContent, SWAP_AT_MS);
      setTimeout(() => boxes.forEach(stopCurtain), SWAP_TOTAL_MS);
    }

    function setActiveLang(langKey){
      langButtons.forEach(btn => {
        if (btn.dataset.lang === langKey) {
          btn.setAttribute("aria-current", "true");
        } else {
          btn.removeAttribute("aria-current");
        }
      });
    }

    function applyLanguage(langKey){
      const c = CONTENT[langKey];
      document.documentElement.lang = c.htmlLang;
      contactLabel.textContent = open ? c.back : c.contact;
      descText.textContent = c.desc;
      locationText.textContent = c.location;
      footerBrand.textContent = c.footerBrand;
      setActiveLang(langKey);
      updateClock();
    }

    function setLanguage(langKey){
      if (!CONTENT[langKey] || langKey === currentLang) return;
      currentLang = langKey;

      curtainSwap([contactSwap, descSwap], () => {
        applyLanguage(langKey);
      });
    }

    function setOpen(v){
      open = v;
      panel.classList.toggle("is-open", open);
      contactBtn.setAttribute("aria-expanded", String(open));
      contactLabel.textContent = open ? CONTENT[currentLang].back : CONTENT[currentLang].contact;
    }

    contactBtn.addEventListener("click", () => {
      setOpen(!open);
    });

    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape" && open) {
        setOpen(false);
        contactBtn.focus();
      }
    });

    langButtons.forEach(btn => {
      btn.addEventListener("click", () => {
        setLanguage(btn.dataset.lang);
      });
    });

    applyLanguage("en");
    updateClock();
    setInterval(updateClock, 10000);
  </script>
</body>
</html>

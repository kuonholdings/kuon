<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>KUON HOLDINGS</title>
  <meta name="description" content="KUON HOLDINGS" />
  <meta name="theme-color" content="#ffffff" />

  <style>
    :root{
      --bg:#ffffff;
      --fg:#111111;
      --fg-soft:rgba(70,78,92,0.68);
      --muted-1:rgba(0,0,0,0.82);
      --muted-2:rgba(0,0,0,0.62);
      --muted-3:rgba(0,0,0,0.42);
      --muted-4:rgba(0,0,0,0.24);

      --pad-x:64px;
      --pad-y:56px;

      --hero-top:50vh;

      --logo-size:56px;
      --logo-track:0.15em;
      --logo-pad:0.15em;
      --logo-line-h:calc(var(--logo-size) * 1.12);

      --meta-size:12px;
      --meta-track:0.14em;

      --tag-size:16px;
      --tag-line:1.5;
      --tag-track:0.04em;
      --tag-gap:18px;

      --nav-size:12px;
      --nav-track:0.20em;
      --nav-gap:30px;

      --loc-size:12px;
      --loc-track:0.16em;
      --loc-gap:28px;

      --body-size:14px;
      --body-line:1.8;
      --body-track:0.08em;

      --panel-gap:18px;
      --panel-width:660px;
      --panel-min-h:150px;

      --line-y-gap:18px;
      --horizon-color:rgba(80,90,100,0.22);

      --swap-ms:900ms;
      --swap-ease:cubic-bezier(.35,0,.25,1);

      --intro-brand-ms:1000ms;
      --intro-division-ms:1000ms;
      --intro-line-ms:1100ms;
      --intro-rest-ms:1000ms;
      --intro-delay-1:260ms;
      --intro-delay-2:760ms;
      --intro-delay-3:1380ms;
      --intro-delay-4:2000ms;
    }

    *{ box-sizing:border-box; }
    html, body{ height:100%; }

    body{
      margin:0;
      background:var(--bg);
      color:var(--fg);
      overflow:hidden;
      font-family:-apple-system, BlinkMacSystemFont, "Helvetica Neue", Helvetica, Arial, sans-serif;
      -webkit-font-smoothing:antialiased;
      -moz-osx-font-smoothing:grayscale;
    }

    a, button{
      -webkit-tap-highlight-color:transparent;
    }

    .wrap{
      position:relative;
      width:100%;
      height:100%;
      padding:var(--pad-y) var(--pad-x);
    }

    .clock{
      position:fixed;
      top:var(--pad-y);
      right:var(--pad-x);
      z-index:3;
      font-size:var(--meta-size);
      letter-spacing:var(--meta-track);
      text-transform:uppercase;
      line-height:1.6;
      color:var(--muted-3);
      font-variant-numeric:tabular-nums;
      white-space:nowrap;
      user-select:none;
    }

    .stack{
      position:fixed;
      left:var(--pad-x);
      bottom:var(--pad-y);
      z-index:3;
      display:grid;
      gap:6px;
      justify-items:start;
      font-size:var(--meta-size);
      letter-spacing:var(--meta-track);
      text-transform:uppercase;
      line-height:1.5;
      color:var(--muted-3);
    }

    .stack .brandline{
      color:var(--muted-3);
    }

    .stack a{
      color:var(--muted-3);
      text-decoration:none;
      transition:color 180ms ease;
    }

    .stack a:hover{
      color:var(--fg);
    }

    .lang-switch{
      display:flex;
      align-items:center;
      gap:10px;
    }

    .lang-btn{
      background:transparent;
      border:0;
      padding:0;
      cursor:pointer;
      color:var(--muted-3);
      transition:color 180ms ease;
      font:inherit;
      letter-spacing:inherit;
      text-transform:inherit;
    }

    .lang-btn:hover{ color:var(--fg); }
    .lang-btn[aria-current="true"]{ color:rgba(0,0,0,0.82); }

    .lang-sep{
      color:var(--muted-4);
      pointer-events:none;
    }

    .center{
      position:absolute;
      left:50%;
      top:var(--hero-top);
      transform:translate(-50%, -50%);
      width:min(980px, calc(100% - 40px));
      text-align:center;
    }

    .hero{
      display:flex;
      flex-direction:column;
      align-items:center;
      min-height:420px;
    }

    .logoBox{
      height:var(--logo-line-h);
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .logo{
      margin:0;
      font-size:var(--logo-size);
      line-height:1;
      letter-spacing:var(--logo-track);
      padding-left:var(--logo-pad);
      white-space:nowrap;
      font-weight:700;
    }

    .logo .brand{ color:var(--fg); }
    .logo .division{ color:var(--fg-soft); }

    .horizonWrap{
      width:100%;
      margin-top:var(--line-y-gap);
      padding:0;
    }

    .horizon{
      height:1px;
      background:var(--horizon-color);
      transform:scaleX(0);
      transform-origin:center center;
    }

    .tagline{
      margin:18px 0 0;
      max-width:60ch;
      min-height:34px;
      font-size:var(--tag-size);
      line-height:var(--tag-line);
      letter-spacing:var(--tag-track);
      color:var(--muted-1);
      text-align:center;
      font-weight:500;
    }

    .nav{
      margin-top:var(--nav-gap);
      min-height:20px;
      display:flex;
      justify-content:center;
      align-items:center;
      gap:22px;
      flex-wrap:wrap;
    }

    .nav button{
      background:transparent;
      border:0;
      padding:0;
      cursor:pointer;
      font-size:var(--nav-size);
      letter-spacing:var(--nav-track);
      text-transform:uppercase;
      color:var(--muted-3);
      transition:color 180ms ease;
      position:relative;
    }

    .nav button:hover{ color:var(--fg); }

    .nav button.active{
      color:rgba(0,0,0,0.82);
    }

    .nav button.active::after{
      content:"";
      position:absolute;
      left:0;
      right:0;
      bottom:-4px;
      height:1px;
      background:rgba(0,0,0,0.22);
    }

    .locationStatic{
      margin:var(--loc-gap) 0 0;
      min-height:20px;
      font-size:var(--loc-size);
      line-height:1.7;
      letter-spacing:var(--loc-track);
      text-transform:uppercase;
      color:var(--muted-3);
      text-align:center;
    }

    .panel{
      width:min(var(--panel-width), 100%);
      min-height:var(--panel-min-h);
      margin:22px auto 0;
      display:flex;
      align-items:flex-start;
      justify-content:center;
    }

    .panelInner{
      width:100%;
      display:grid;
      gap:var(--panel-gap);
      justify-items:center;
    }

    .body{
      margin:0;
      max-width:62ch;
      font-size:var(--body-size);
      line-height:var(--body-line);
      letter-spacing:var(--body-track);
      color:var(--muted-1);
      text-align:center;
    }

    .email{
      font-size:13px;
      line-height:1.7;
      letter-spacing:0.12em;
      text-decoration:none;
      color:var(--muted-2);
      transition:color 160ms ease;
    }

    .email:hover{ color:var(--fg); }

    .swapBox{
      position:relative;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      width:100%;
    }

    .swapBox::before{
      content:"";
      position:absolute;
      inset:-6px -12px;
      background:var(--bg);
      opacity:0;
      pointer-events:none;
    }

    @keyframes curtain{
      0%{ opacity:0; }
      45%{ opacity:1; }
      55%{ opacity:1; }
      100%{ opacity:0; }
    }

    .swapBox.is-swapping::before{
      animation:curtain var(--swap-ms) var(--swap-ease) both;
    }

    .intro-brand,
    .intro-division,
    .intro-line,
    .intro-rest{
      opacity:0;
      transform:translateY(10px);
    }

    .is-ready .intro-brand{
      animation:introRise var(--intro-brand-ms) cubic-bezier(.22,.61,.36,1) var(--intro-delay-1) forwards;
    }

    .is-ready .intro-division{
      animation:introRise var(--intro-division-ms) cubic-bezier(.22,.61,.36,1) var(--intro-delay-2) forwards;
    }

    .is-ready .intro-line{
      animation:introRise var(--intro-line-ms) cubic-bezier(.22,.61,.36,1) var(--intro-delay-3) forwards;
    }

    .is-ready .intro-line .horizon{
      animation:lineDraw var(--intro-line-ms) cubic-bezier(.22,.61,.36,1) var(--intro-delay-3) forwards;
    }

    .is-ready .intro-rest{
      animation:introRise var(--intro-rest-ms) cubic-bezier(.22,.61,.36,1) var(--intro-delay-4) forwards;
    }

    @keyframes introRise{
      from{ opacity:0; transform:translateY(10px); }
      to{ opacity:1; transform:translateY(0); }
    }

    @keyframes lineDraw{
      from{ transform:scaleX(0); }
      to{ transform:scaleX(1); }
    }

    @media (prefers-reduced-motion: reduce){
      .swapBox.is-swapping::before{ animation:none; opacity:0; }
      .intro-brand,
      .intro-division,
      .intro-line,
      .intro-rest{
        opacity:1;
        transform:none;
        animation:none !important;
      }
      .horizon{ transform:scaleX(1); }
    }

    @media (max-width: 720px){
      :root{
        --pad-x:22px;
        --pad-y:40px;
        --hero-top:50vh;
        --logo-size:42px;
        --logo-track:0.12em;
        --logo-pad:0.12em;
        --tag-size:15px;
        --meta-size:11px;
        --nav-size:11px;
        --body-size:13px;
        --loc-gap:22px;
      }

      .nav{ gap:16px; }
    }
  </style>
</head>

<body>
  <div class="clock intro-rest" id="clockText">—</div>

  <div class="stack intro-rest">
    <div class="brandline" id="footerBrand">KUON</div>
    <a href="https://kuon.studio">STUDIO</a>
    <div class="lang-switch" aria-label="Language selector">
      <button class="lang-btn" type="button" data-lang="en" aria-current="true">EN</button>
      <span class="lang-sep">/</span>
      <button class="lang-btn" type="button" data-lang="zh-Hant">繁中</button>
    </div>
  </div>

  <div class="wrap">
    <main class="center" aria-label="KUON HOLDINGS">
      <div class="hero">
        <div class="logoBox">
          <h1 class="logo">
            <span class="brand intro-brand">KUON</span>
            <span class="division intro-division">HOLDINGS</span>
          </h1>
        </div>

        <div class="horizonWrap intro-line">
          <div class="horizon"></div>
        </div>

        <p class="tagline intro-rest" id="taglineText">Industrial Development Platform</p>

        <div class="nav intro-rest" id="nav">
          <button data-panel="products" class="active" type="button">PRODUCTS</button>
          <button data-panel="distribution" type="button">DISTRIBUTION</button>
          <button data-panel="manufacturing" type="button">MANUFACTURING</button>
          <button data-panel="contact" type="button">CONTACT</button>
        </div>

        <p class="locationStatic intro-rest" id="locationStatic">Taipei / London</p>

        <div class="panel intro-rest">
          <div class="swapBox" id="panelSwap">
            <div id="panelInner" class="panelInner"></div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script>
    const prefersReducedMotion =
      window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;

    const SWAP_TOTAL_MS = 900;
    const SWAP_AT_MS = Math.round(SWAP_TOTAL_MS * 0.50);

    const CONTENT = {
      "en": {
        htmlLang: "en",
        footerBrand: "KUON",
        tagline: "Industrial Development Platform",
        location: "Taipei / London",
        nav: {
          products: "PRODUCTS",
          distribution: "DISTRIBUTION",
          manufacturing: "MANUFACTURING",
          contact: "CONTACT"
        },
        panels: {
          products: `
            <p class="body">
              Product platforms in operation and development across audio, integration, and future brand-led work.
            </p>
          `,
          distribution: `
            <p class="body">
              Channel development, market access, and selected regional routes to market across strategic territories.
            </p>
          `,
          manufacturing: `
            <p class="body">
              Current production partnerships and future manufacturing capability under development.
            </p>
          `,
          contact: `
            <a class="email" href="mailto:info@kuonholdings.com">info@kuonholdings.com</a>
          `
        },
        clockZone: "Europe/London",
        clockLabel: "LDN"
      },
      "zh-Hant": {
        htmlLang: "zh-Hant",
        footerBrand: "久音",
        tagline: "工業發展平台",
        location: "台北 / 倫敦",
        nav: {
          products: "產品",
          distribution: "通路",
          manufacturing: "製造",
          contact: "聯絡"
        },
        panels: {
          products: `
            <p class="body">
              涵蓋音響、整合與未來品牌導向工作的產品平台，包含現有與發展中的項目。
            </p>
          `,
          distribution: `
            <p class="body">
              聚焦通路建構、市場進入，以及特定區域的策略性路徑。
            </p>
          `,
          manufacturing: `
            <p class="body">
              現有生產合作關係，以及持續規劃中的未來製造能力。
            </p>
          `,
          contact: `
            <a class="email" href="mailto:info@kuonholdings.com">info@kuonholdings.com</a>
          `
        },
        clockZone: "Asia/Taipei",
        clockLabel: "TPE"
      }
    };

    let currentLang = "en";
    let currentPanel = "products";

    const clockText = document.getElementById("clockText");
    const footerBrand = document.getElementById("footerBrand");
    const taglineText = document.getElementById("taglineText");
    const locationStatic = document.getElementById("locationStatic");
    const panelInner = document.getElementById("panelInner");
    const panelSwap = document.getElementById("panelSwap");
    const navButtons = Array.from(document.querySelectorAll(".nav button"));
    const langButtons = Array.from(document.querySelectorAll(".lang-btn"));

    function partsForTZ(date, timeZone){
      const fmt = new Intl.DateTimeFormat("en-GB", {
        timeZone,
        year: "numeric",
        month: "2-digit",
        day: "2-digit",
        hour: "2-digit",
        minute: "2-digit",
        hour12: false
      });
      const parts = fmt.formatToParts(date);
      const get = (type) => parts.find(p => p.type === type)?.value || "";
      return {
        Y: get("year"),
        M: get("month"),
        D: get("day"),
        h: get("hour"),
        m: get("minute")
      };
    }

    function formatClock(date, langKey){
      const { clockZone, clockLabel } = CONTENT[langKey];
      const p = partsForTZ(date, clockZone);
      return `${p.Y}.${p.M}.${p.D} ${p.h}:${p.m} ${clockLabel}`;
    }

    function updateClock(){
      clockText.textContent = formatClock(new Date(), currentLang);
    }

    function startCurtain(box){
      box.classList.remove("is-swapping");
      void box.offsetWidth;
      box.classList.add("is-swapping");
    }

    function stopCurtain(box){
      box.classList.remove("is-swapping");
    }

    function curtainSwap(boxes, applyNewContent){
      if (prefersReducedMotion){
        applyNewContent();
        return;
      }
      boxes.forEach(startCurtain);
      setTimeout(applyNewContent, SWAP_AT_MS);
      setTimeout(() => boxes.forEach(stopCurtain), SWAP_TOTAL_MS);
    }

    function setActiveLang(langKey){
      langButtons.forEach(btn => {
        if (btn.dataset.lang === langKey) btn.setAttribute("aria-current", "true");
        else btn.removeAttribute("aria-current");
      });
    }

    function setActivePanel(panelKey){
      navButtons.forEach(btn => {
        btn.classList.toggle("active", btn.dataset.panel === panelKey);
      });
    }

    function renderPanel(panelKey){
      panelInner.innerHTML = CONTENT[currentLang].panels[panelKey];
      setActivePanel(panelKey);
    }

    function applyLanguage(langKey){
      const c = CONTENT[langKey];
      document.documentElement.lang = c.htmlLang;
      footerBrand.textContent = c.footerBrand;
      taglineText.textContent = c.tagline;
      locationStatic.textContent = c.location;

      navButtons.forEach(btn => {
        const key = btn.dataset.panel;
        btn.textContent = c.nav[key];
      });

      renderPanel(currentPanel);
      setActiveLang(langKey);
      updateClock();
    }

    function setLanguage(langKey){
      if (!CONTENT[langKey] || langKey === currentLang) return;
      currentLang = langKey;
      curtainSwap([panelSwap], () => applyLanguage(langKey));
    }

    function setPanel(panelKey){
      if (!CONTENT[currentLang].panels[panelKey] || panelKey === currentPanel) return;
      currentPanel = panelKey;
      curtainSwap([panelSwap], () => renderPanel(panelKey));
    }

    navButtons.forEach(btn => {
      btn.addEventListener("click", () => setPanel(btn.dataset.panel));
    });

    langButtons.forEach(btn => {
      btn.addEventListener("click", () => setLanguage(btn.dataset.lang));
    });

    applyLanguage("en");
    updateClock();
    setInterval(updateClock, 10000);

    if (!prefersReducedMotion) {
      requestAnimationFrame(() => document.body.classList.add("is-ready"));
    } else {
      document.body.classList.add("is-ready");
    }
  </script>
</body>
</html>
